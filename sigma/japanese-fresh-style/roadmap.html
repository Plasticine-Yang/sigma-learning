<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日系清新调色 学习路线图</title>
    <style>
        :root {
            --bg: #fdfdfd;
            --card-bg: #ffffff;
            --text: #334155;
            --text-muted: #94a3b8;
            --accent: #7dd3fc;
            --success: #86efac;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            line-height: 1.5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: #38bdf8;
            font-weight: 300;
            letter-spacing: 0.1em;
        }
        .progress-bar {
            background: #f1f5f9;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 3rem;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 100%; /* Updated */
            transition: width 0.5s ease;
        }
        .timeline {
            position: relative;
            padding-left: 2rem;
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border);
        }
        .concept {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
        }
        .concept:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }
        .concept::before {
            content: '';
            position: absolute;
            left: -2rem;
            top: 50%;
            transform: translateY(-50%) translateX(-50%);
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--bg);
            border: 2px solid var(--border);
            z-index: 1;
        }
        .concept.mastered {
            border-color: var(--success);
        }
        .concept.mastered::before {
            background: var(--success);
            border-color: var(--success);
        }
        .concept.in-progress {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(125, 211, 252, 0.2);
        }
        .concept.in-progress::before {
            background: var(--accent);
            border-color: var(--accent);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(125, 211, 252, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(125, 211, 252, 0); }
            100% { box-shadow: 0 0 0 0 rgba(125, 211, 252, 0); }
        }
        .concept-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .concept-title {
            font-weight: 600;
            font-size: 1.1rem;
        }
        .concept-status {
            font-size: 0.8rem;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.05em;
        }
        .status-not-started { background: #f1f5f9; color: var(--text-muted); }
        .status-in-progress { background: #e0f2fe; color: #0284c7; }
        .status-mastered { background: #dcfce7; color: #16a34a; }
        
        .concept-meta {
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            gap: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>日系清新调色</h1>
        
        <div class="progress-bar">
            <div class="progress-fill" style="width: 100%"></div>
        </div>

        <div class="timeline">
            <!-- Concept 1 -->
            <div class="concept mastered">
                <div class="concept-header">
                    <div class="concept-title">1. 低对比度与高明度 (Low Contrast & High Key)</div>
                    <div class="concept-status status-mastered">已掌握</div>
                </div>
            </div>

            <!-- Concept 2 -->
            <div class="concept mastered">
                <div class="concept-header">
                    <div class="concept-title">2. 青蓝色的空气感 (Cyan/Blue Tint)</div>
                    <div class="concept-status status-mastered">已掌握</div>
                </div>
            </div>

            <!-- Concept 3 -->
            <div class="concept mastered">
                <div class="concept-header">
                    <div class="concept-title">3. 肤色的通透处理 (Skin Tone Translucency)</div>
                    <div class="concept-status status-mastered">已掌握</div>
                </div>
            </div>

            <!-- Concept 4 -->
            <div class="concept mastered">
                <div class="concept-header">
                    <div class="concept-title">4. 胶片颗粒与柔光 (Grain & Softness)</div>
                    <div class="concept-status status-mastered">已掌握</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
