<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日系风格直方图对比</title>
    <style>
        body { font-family: sans-serif; background: #fdfdfd; color: #334155; padding: 2rem; display: flex; justify-content: center; }
        .container { max-width: 800px; width: 100%; }
        .chart-container { display: flex; gap: 2rem; justify-content: space-around; margin-top: 2rem; }
        .chart-box { text-align: center; width: 300px; }
        .histogram {
            width: 100%;
            height: 150px;
            background: #f1f5f9;
            border-bottom: 2px solid #cbd5e1;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 0 10px;
            box-sizing: border-box;
            gap: 2px;
        }
        .bar { background: #94a3b8; flex: 1; border-radius: 2px 2px 0 0; }
        
        /* Standard Contrast Histogram */
        .hist-std .bar:nth-child(1) { height: 10%; }
        .hist-std .bar:nth-child(2) { height: 30%; } /* Shadows */
        .hist-std .bar:nth-child(3) { height: 60%; }
        .hist-std .bar:nth-child(4) { height: 80%; } /* Midtones */
        .hist-std .bar:nth-child(5) { height: 60%; }
        .hist-std .bar:nth-child(6) { height: 30%; } /* Highlights */
        .hist-std .bar:nth-child(7) { height: 10%; }

        /* Japanese Style Histogram */
        .hist-jp .bar:nth-child(1) { height: 0%; } /* No pure blacks */
        .hist-jp .bar:nth-child(2) { height: 10%; }
        .hist-jp .bar:nth-child(3) { height: 30%; }
        .hist-jp .bar:nth-child(4) { height: 70%; } /* Bright Midtones */
        .hist-jp .bar:nth-child(5) { height: 90%; }
        .hist-jp .bar:nth-child(6) { height: 80%; } /* Blown highlights okay */
        .hist-jp .bar:nth-child(7) { height: 60%; }

        h3 { font-weight: 500; color: #475569; margin-bottom: 0.5rem; }
        p { font-size: 0.9rem; color: #64748b; line-height: 1.4; }
        .highlight { color: #38bdf8; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center; font-weight: 300; color: #38bdf8;">日系风格的“光”有何不同？</h2>
        
        <div class="chart-container">
            <div class="chart-box">
                <h3>普通照片</h3>
                <div class="histogram hist-std">
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                </div>
                <p>暗部实，亮部实。<br>追求全色阶覆盖，对比度适中。</p>
            </div>

            <div class="chart-box">
                <h3>日系清新</h3>
                <div class="histogram hist-jp">
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                </div>
                <p>暗部悬空（不碰底），整体右移。<br><span class="highlight">过曝一点点是允许的，死黑是绝对禁止的。</span></p>
            </div>
        </div>
    </div>
</body>
</html>
