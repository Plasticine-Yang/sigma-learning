<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摄影调色：互补色轮</title>
    <style>
        body { font-family: sans-serif; background: #1e293b; color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { text-align: center; }
        
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 2rem;
        }

        .color-wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                #ff0000 0deg,    /* Red */
                #ffff00 60deg,   /* Yellow */
                #00ff00 120deg,  /* Green */
                #00ffff 180deg,  /* Cyan */
                #0000ff 240deg,  /* Blue */
                #ff00ff 300deg,  /* Magenta */
                #ff0000 360deg   /* Red */
            );
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .center-point {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            z-index: 10;
        }

        .label {
            position: absolute;
            font-weight: bold;
            text-shadow: 0 0 4px rgba(0,0,0,0.8);
            color: white;
            font-size: 0.9rem;
        }

        /* Positioning labels */
        .label.red { top: 5%; left: 50%; transform: translateX(-50%); }
        .label.yellow { top: 20%; right: 5%; }
        .label.green { bottom: 20%; right: 5%; }
        .label.cyan { bottom: 5%; left: 50%; transform: translateX(-50%); }
        .label.blue { bottom: 20%; left: 5%; }
        .label.magenta { top: 20%; left: 5%; }

        /* Connection Lines */
        .line {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 260px;
            height: 2px;
            background: rgba(255, 255, 255, 0.4);
            transform-origin: 0 0;
            pointer-events: none;
        }
        
        /* Red-Cyan */
        .line.rc { transform: rotate(-90deg) translateX(-50%); } 
        /* Green-Magenta */
        .line.gm { transform: rotate(30deg) translateX(-50%); }
        /* Blue-Yellow */
        .line.by { transform: rotate(150deg) translateX(-50%); }

        .hint {
            background: #334155;
            padding: 1rem;
            border-radius: 8px;
            max-width: 400px;
            margin: 0 auto;
            border-left: 4px solid #38bdf8;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>RGB / CMY 互补色轮</h2>
        
        <div class="wheel-container">
            <div class="color-wheel">
                <div class="line rc"></div>
                <div class="line gm"></div>
                <div class="line by"></div>
                
                <div class="label red">红 (Red)</div>
                <div class="label yellow">黄 (Yellow)</div>
                <div class="label green">绿 (Green)</div>
                <div class="label cyan">青 (Cyan)</div>
                <div class="label blue">蓝 (Blue)</div>
                <div class="label magenta">洋红/紫 (Magenta)</div>
            </div>
            <div class="center-point"></div>
        </div>

        <div class="hint">
            <strong>找补色口诀：</strong><br>
            沿着中心点画一条直线，对面的颜色就是补色。<br>
            <br>
            红 <-> 青<br>
            绿 <-> 洋红<br>
            蓝 <-> 黄
        </div>
    </div>
</body>
</html>
