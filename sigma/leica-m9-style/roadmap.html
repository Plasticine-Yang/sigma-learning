<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>徕卡 M9 风格 学习路线图</title>
    <style>
        :root {
            --bg: #1c1917;
            --card-bg: #292524;
            --text: #e7e5e4;
            --text-muted: #a8a29e;
            --accent: #dc2626; /* Leica Red */
            --success: #22c55e;
            --border: #44403c;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            line-height: 1.5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--text);
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .leica-badge {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: bold;
            vertical-align: middle;
            margin-left: 0.5rem;
        }
        .progress-bar {
            background: var(--card-bg);
            height: 8px;
            border-radius: 4px;
            margin-bottom: 3rem;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 100%; /* Updated */
            transition: width 0.5s ease;
        }
        .timeline {
            position: relative;
            padding-left: 2rem;
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border);
        }
        .concept {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 2px; /* Sharper corners for Leica feel */
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            position: relative;
            transition: transform 0.2s;
        }
        .concept:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }
        .concept::before {
            content: '';
            position: absolute;
            left: -2rem;
            top: 50%;
            transform: translateY(-50%) translateX(-50%);
            width: 12px;
            height: 12px;
            background: var(--bg);
            border: 2px solid var(--border);
            z-index: 1;
        }
        .concept.mastered {
            border-color: var(--success);
        }
        .concept.mastered::before {
            background: var(--success);
            border-color: var(--success);
        }
        .concept.in-progress {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(220, 38, 38, 0.2);
        }
        .concept.in-progress::before {
            background: var(--accent);
            border-color: var(--accent);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
        .concept-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .concept-title {
            font-weight: 600;
            font-size: 1.1rem;
        }
        .concept-status {
            font-size: 0.8rem;
            padding: 0.25rem 0.75rem;
            border-radius: 2px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.05em;
        }
        .status-not-started { background: #44403c; color: var(--text-muted); }
        .status-in-progress { background: rgba(220, 38, 38, 0.2); color: #fca5a5; }
        .status-mastered { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        
        .concept-meta {
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            gap: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>徕卡 M9 风格 <span class="leica-badge">CCD Look</span></h1>
        
        <div class="progress-bar">
            <div class="progress-fill" style="width: 100%"></div>
        </div>

        <div class="timeline">
            <!-- Concept 1 -->
            <div class="concept mastered">
                <div class="concept-header">
                    <div class="concept-title">1. CCD 的高饱和低明度 (Rich Color & Low Key)</div>
                    <div class="concept-status status-mastered">已掌握</div>
                </div>
            </div>

            <!-- Concept 2 -->
            <div class="concept mastered">
                <div class="concept-header">
                    <div class="concept-title">2. 蓝调与红调的特殊偏移 (Blue/Red Shift)</div>
                    <div class="concept-status status-mastered">已掌握</div>
                </div>
            </div>

            <!-- Concept 3 -->
            <div class="concept mastered">
                <div class="concept-header">
                    <div class="concept-title">3. 暗角与中心重点测光感 (Vignetting)</div>
                    <div class="concept-status status-mastered">已掌握</div>
                </div>
            </div>

            <!-- Concept 4 -->
            <div class="concept mastered">
                <div class="concept-header">
                    <div class="concept-title">4. 锐度与微反差 (Micro-contrast)</div>
                    <div class="concept-status status-mastered">已掌握</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
