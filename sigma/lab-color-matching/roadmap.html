<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB 仿色学习路线图</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #e2e8f0;
            --accent: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }
        h1 {
            text-align: center;
            margin-bottom: 40px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .roadmap {
            position: relative;
            padding: 20px 0;
        }
        .roadmap::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #334155;
            border-radius: 2px;
        }
        .concept {
            position: relative;
            margin-bottom: 30px;
            padding-left: 60px;
        }
        .concept::before {
            content: '';
            position: absolute;
            left: 12px;
            top: 24px;
            width: 20px;
            height: 20px;
            background: var(--bg);
            border: 4px solid #334155;
            border-radius: 50%;
            z-index: 1;
            transition: all 0.3s ease;
        }
        .concept.completed::before {
            border-color: var(--success);
            background: var(--success);
        }
        .concept.active::before {
            border-color: var(--accent);
            background: var(--bg);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
            animation: pulse 2s infinite;
        }
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #334155;
            transition: transform 0.2s ease;
        }
        .card:hover {
            transform: translateY(-2px);
        }
        .concept.active .card {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent), 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .concept-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .concept-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
        }
        .status-badge {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 9999px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .status-not-started { background: #334155; color: #94a3b8; }
        .status-in-progress { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .status-completed { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        
        .progress-bar-container {
            margin-top: 10px;
            height: 6px;
            background: #334155;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: var(--success);
            width: 0%;
            transition: width 0.5s ease;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LAB 仿色学习路线图</h1>
        
        <div class="roadmap">
            <!-- Concept 1 -->
            <div class="concept active" id="c1">
                <div class="card">
                    <div class="concept-header">
                        <h3 class="concept-title">LAB 核心逻辑 (L vs AB)</h3>
                        <span class="status-badge status-in-progress">进行中</span>
                    </div>
                    <p>理解为何 LAB 是仿色的神器：彻底分离明度与色彩。</p>
                </div>
            </div>

            <!-- Concept 2 -->
            <div class="concept" id="c2">
                <div class="card">
                    <div class="concept-header">
                        <h3 class="concept-title">A 通道 (绿-品红)</h3>
                        <span class="status-badge status-not-started">未开始</span>
                    </div>
                    <p>掌握 A 通道的色彩对立关系与调整逻辑。</p>
                </div>
            </div>

            <!-- Concept 3 -->
            <div class="concept" id="c3">
                <div class="card">
                    <div class="concept-header">
                        <h3 class="concept-title">B 通道 (蓝-黄)</h3>
                        <span class="status-badge status-not-started">未开始</span>
                    </div>
                    <p>掌握 B 通道的色彩对立关系与调整逻辑。</p>
                </div>
            </div>

            <!-- Concept 4 -->
            <div class="concept" id="c4">
                <div class="card">
                    <div class="concept-header">
                        <h3 class="concept-title">LAB 曲线操作</h3>
                        <span class="status-badge status-not-started">未开始</span>
                    </div>
                    <p>学习如何在 LAB 模式下使用曲线进行精准调色。</p>
                </div>
            </div>

            <!-- Concept 5 -->
            <div class="concept" id="c5">
                <div class="card">
                    <div class="concept-header">
                        <h3 class="concept-title">仿色实战流程</h3>
                        <span class="status-badge status-not-started">未开始</span>
                    </div>
                    <p>综合运用：分析目标图 -> 匹配 L -> 匹配 AB。</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
